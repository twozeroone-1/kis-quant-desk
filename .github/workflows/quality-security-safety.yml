name: quality-security-safety

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python-quality:
    name: Python quality and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install local quality dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff mypy pytest pytest-cov import-linter
      - name: Ruff lint safety gate
        run: python -m ruff check scripts/trading_safety_gate.py tests/test_trading_safety_gate.py
      - name: MyPy typecheck safety gate
        run: python -m mypy --explicit-package-bases scripts/trading_safety_gate.py tests/test_trading_safety_gate.py
      - name: Import architecture gate
        run: python -m lint_imports
      - name: Trading safety gate
        run: python scripts/trading_safety_gate.py
      - name: Safety gate tests
        run: python -m pytest tests/test_trading_safety_gate.py -q

  dependency-audit:
    name: Dependency and secret audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install audit tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install detect-secrets pip-audit
      - name: Secret baseline-free scan
        run: detect-secrets scan --exclude-files '(^uv.lock$|^tests/fixtures/)'
      - name: Python dependency audit
        run: pip-audit --progress-spinner off -r requirements.txt
