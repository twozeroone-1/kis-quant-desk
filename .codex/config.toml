openai_base_url = "http://127.0.0.1:18318/v1"
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
model_catalog_json = "/home/from0to01/open-trading-api/.codex/model-catalog-cliproxy.json"

# Approval prefix rules are read from $CODEX_HOME/rules/default.rules.
# Run Codex with CODEX_HOME set to this project's .codex directory to keep
# approvals project-local (see ./codex-local.sh).

approval_policy = "on-request"
sandbox_mode = "workspace-write"
project_doc_fallback_filenames = ["AGENTS.md"]
plan_mode_reasoning_effort = "xhigh"

# MCP 서버 — url만으로 HTTP 자동 인식 (type 불필요)
[mcp_servers.kis-backtest]
url = "http://127.0.0.1:3846/mcp"
enabled = true
startup_timeout_sec = 10
tool_timeout_sec = 120  # 백테스팅 최대 실행 시간

[mcp_servers.kis-backtest.tools.run_preset_backtest_tool]
approval_mode = "approve"

[mcp_servers.kis-backtest.tools.get_backtest_result_tool]
approval_mode = "approve"

[mcp_servers.kis-backtest.tools.list_indicators_tool]
approval_mode = "approve"

[mcp_servers.kis-backtest.tools.validate_yaml_tool]
approval_mode = "approve"

[mcp_servers.kis-backtest.tools.list_presets_tool]
approval_mode = "approve"

[mcp_servers.kis-backtest.tools.get_report_tool]
approval_mode = "approve"

[mcp_servers.agentmemory]
command = "/home/from0to01/.codex/agentmemory-mcp.sh"
args = []
startup_timeout_sec = 120

[mcp_servers.agentmemory.env]
AGENTMEMORY_URL = "http://127.0.0.1:3117"
AGENTMEMORY_TOOLS = "all"
AGENTMEMORY_FORCE_PROXY = "1"
AGENTMEMORY_PROBE_TIMEOUT_MS = "5000"

[mcp_servers.agentmemory.tools.memory_recall]
approval_mode = "approve"

[mcp_servers.agentmemory.tools.memory_smart_search]
approval_mode = "approve"

