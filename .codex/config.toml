openai_base_url = "http://127.0.0.1:18317/v1"
model = "gpt-5.5"
model_reasoning_effort = "xhigh"

# Approval prefix rules are read from $CODEX_HOME/rules/default.rules.
# Run Codex with CODEX_HOME set to this project's .codex directory to keep
# approvals project-local (see ./codex-local.sh).

approval_policy = "on-request"
sandbox_mode = "workspace-write"
project_doc_fallback_filenames = ["AGENTS.md"]
plan_mode_reasoning_effort = "xhigh"

# MCP 서버 — url만으로 HTTP 자동 인식 (type 불필요)
[mcp_servers.kis-backtest]
url = "http://127.0.0.1:3846/mcp"
enabled = true
startup_timeout_sec = 10
tool_timeout_sec = 120  # 백테스팅 최대 실행 시간

[mcp_servers.kis-backtest.tools.run_preset_backtest_tool]
approval_mode = "approve"

[mcp_servers.kis-backtest.tools.get_backtest_result_tool]
approval_mode = "approve"

[mcp_servers.kis-backtest.tools.list_indicators_tool]
approval_mode = "approve"

[mcp_servers.kis-backtest.tools.validate_yaml_tool]
approval_mode = "approve"

[mcp_servers.kis-backtest.tools.list_presets_tool]
approval_mode = "approve"

[mcp_servers.kis-backtest.tools.get_report_tool]
approval_mode = "approve"

[mcp_servers.agentmemory]
command = "/home/from0to01/.codex/agentmemory-mcp.sh"
args = []
startup_timeout_sec = 120

[mcp_servers.agentmemory.env]
AGENTMEMORY_URL = "http://127.0.0.1:3117"
AGENTMEMORY_TOOLS = "all"
AGENTMEMORY_FORCE_PROXY = "1"
AGENTMEMORY_PROBE_TIMEOUT_MS = "5000"

# Skills 경로 명시 (Codex는 .agents/skills/ 자동 탐색 불가, 명시 필요)
[[skills.config]]
path = ".codex/skills/kis-strategy-builder"
enabled = true

[[skills.config]]
path = ".codex/skills/kis-backtester"
enabled = true

[[skills.config]]
path = ".codex/skills/kis-order-executor"
enabled = true

[[skills.config]]
path = ".codex/skills/kis-team"
enabled = true

[[skills.config]]
path = ".codex/skills/kis-cs"
enabled = true

[[skills.config]]
path = ".codex/skills/auth"
enabled = true

[[skills.config]]
path = ".codex/skills/my-status"
enabled = true

[[skills.config]]
path = ".codex/skills/kis-setup"
enabled = true

[[skills.config]]
path = ".codex/skills/kis-help"
enabled = true

[shell_environment_policy]
inherit = "core"
exclude = ["*SECRET*", "*TOKEN*", "KIS_APP*"]

[features]
multi_agent = false
shell_tool = true

[tui]
notifications = true

[tui.model_availability_nux]
"gpt-5.5" = 4

[history]
persistence = "save-all"
max_bytes = 104857600  # 100 MiB

[projects."/home/from0to01/open-trading-api"]
trust_level = "trusted"

[notice.model_migrations]
"gpt-5.3-codex" = "gpt-5.4"
